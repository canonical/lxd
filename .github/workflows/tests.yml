name: Tests
on:
  push:
    branches:
      - main
      - stable-*
      - release-*
  pull_request:

env:
  CGO_LDFLAGS_ALLOW: "(-Wl,-wrap,pthread_create)|(-Wl,-z,now)"
  LXD_REQUIRED_TESTS: "storage_buckets"
  LXD_SKIP_TESTS: "clustering_upgrade clustering_upgrade_large"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    # Make sure bash is always invoked with `-eo pipefail`
    # https://docs.github.com/en/actions/using-workflows/workflow-syntax-for-github-actions#jobsjob_idstepsshell
    shell: bash

jobs:
  code-tests:
    env:
      CGO_CFLAGS: "-I${{ github.workspace }}/../lxd-test/vendor/raft/include/ -I${{ github.workspace }}/../lxd-test/vendor/dqlite/include/"
      CGO_LDFLAGS: "-L${{ github.workspace }}/../lxd-test/vendor/raft/.libs -L${{ github.workspace }}/../lxd-test/vendor/dqlite/.libs/"
      LD_LIBRARY_PATH: "${{ github.workspace }}/../lxd-test/vendor/raft/.libs/:${{ github.workspace }}/../lxd-test/vendor/dqlite/.libs/"
    name: Code
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install dependencies
        run: |
          set -eux
          sudo add-apt-repository ppa:ubuntu-lxc/daily -y --no-update
          sudo apt-get update

          sudo apt-get install --no-install-recommends -y \
            build-essential \
            curl \
            gettext \
            git \
            libacl1-dev \
            libcap-dev \
            libdbus-1-dev \
            liblxc-dev \
            lxc-templates \
            libseccomp-dev \
            libselinux-dev \
            libsqlite3-dev \
            libtool \
            libudev-dev \
            libuv1-dev \
            make \
            pkg-config \
            shellcheck

          python3 -m pip install flake8

      - name: Download go dependencies
        run: |
          set -eux
          go mod download

      - name: Make LXD tarball and unpack it
        env:
          CUSTOM_VERSION: "test"
        run: |
          set -eux
          make dist
          tar -xzf lxd-test.tar.gz -C "${GITHUB_WORKSPACE}/.."
          rm lxd-test.tar.gz

      - name: Build LXD dependencies
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}/../lxd-test"
          make deps

      - name: Run LXD build
        run: |
          set -eux
          make

      - name: Run static analysis
        env:
          GITHUB_BEFORE: ${{ github.event.before }}
        run: |
          set -eux
          sudo chmod o+w ./po/*
          make static-analysis

      - name: Unit tests (all)
        run: |
          set -eux
          sudo --preserve-env=CGO_CFLAGS,CGO_LDFLAGS,CGO_LDFLAGS_ALLOW,LD_LIBRARY_PATH LD_LIBRARY_PATH=${LD_LIBRARY_PATH} env "PATH=${PATH}" go test ./...

  system-tests:
    env:
      LXD_CEPH_CLUSTER: "ceph"
      LXD_CEPH_CEPHFS: "cephfs"
      LXD_CEPH_CEPHOBJECT_RADOSGW: "http://127.0.0.1"
      LXD_CONCURRENT: "1"
      LXD_VERBOSE: "1"
      LXD_OFFLINE: "1"
      LXD_TMPFS: "1"
      CGO_CFLAGS: "-I/home/runner/go/deps/raft/include/ -I/home/runner/go/deps/dqlite/include/"
      CGO_LDFLAGS: "-L/home/runner/go/deps/raft/.libs -L/home/runner/go/deps/dqlite/.libs/"
      LD_LIBRARY_PATH: "/home/runner/go/deps/raft/.libs/:/home/runner/go/deps/dqlite/.libs/"
    name: System
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        suite: ["cluster", "standalone"]
        backend: ["dir", "btrfs", "lvm", "zfs", "ceph", "random"]
        include:
          - suite: cluster
            backend: dir
          - suite: standalone
            backend: dir
        exclude:
          - suite: standalone
            backend: lvm

    steps:
      - name: Performance tuning
        run: |
          set -eux
          # optimize ext4 FSes for performance, not reliability
          for fs in $(findmnt --noheading --type ext4 --list --uniq | awk '{print $1}'); do
            # nombcache and data=writeback cannot be changed on remount
            sudo mount -o remount,noatime,barrier=0,commit=6000 "${fs}" || true
          done

          # disable dpkg from calling sync()
          echo "force-unsafe-io" | sudo tee /etc/dpkg/dpkg.cfg.d/force-unsafe-io

      - name: Reclaim some space
        run: |
          set -eux

          sudo snap remove lxd --purge
          # Purge older snap revisions that are disabled/superseded by newer revisions of the same snap
          snap list --all | while read -r name _ rev _ _ notes _; do
            [[ "${notes}" =~ disabled$ ]] && snap remove "${name}" --revision "${rev}" --purge
          done || true

          # This was inspired from https://github.com/easimon/maximize-build-space
          df -h /
          # dotnet
          sudo rm -rf /usr/share/dotnet
          # android
          sudo rm -rf /usr/local/lib/android
          # haskell
          sudo rm -rf /opt/ghc
          df -h /

      - name: Remove docker
        run: |
          set -eux
          sudo apt-get autopurge -y containerd.io moby-containerd docker docker-ce podman uidmap
          sudo ip link delete docker0
          sudo nft flush ruleset

      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install dependencies
        run: |
          set -eux
          sudo add-apt-repository ppa:ubuntu-lxc/daily -y --no-update
          sudo apt-get update

          sudo systemctl mask lxc.service lxc-net.service

          sudo apt-get install --no-install-recommends -y \
            curl \
            git \
            libacl1-dev \
            libcap-dev \
            libdbus-1-dev \
            liblxc-dev \
            libseccomp-dev \
            libselinux-dev \
            libsqlite3-dev \
            libtool \
            libudev-dev \
            libuv1-dev \
            make \
            pkg-config\
            acl \
            attr \
            bind9-dnsutils \
            btrfs-progs \
            busybox-static \
            dnsmasq-base \
            easy-rsa \
            gettext \
            jq \
            lxc-utils \
            lvm2 \
            nftables \
            quota \
            rsync \
            s3cmd \
            socat \
            sqlite3 \
            squashfs-tools \
            tar \
            tcl \
            thin-provisioning-tools \
            uuid-runtime \
            xfsprogs \
            xz-utils \
            zfsutils-linux

          # reclaim some space
          sudo apt-get clean

          mkdir -p "$(go env GOPATH)/bin"
          curl -sSfL https://dl.min.io/server/minio/release/linux-amd64/minio --output "$(go env GOPATH)/bin/minio"
          chmod +x "$(go env GOPATH)/bin/minio"

          # Also grab the latest minio client to maintain compatibility with the server.
          curl -sSfL https://dl.min.io/client/mc/release/linux-amd64/mc --output "$(go env GOPATH)/bin/mc"
          chmod +x "$(go env GOPATH)/bin/mc"

      - name: Download go dependencies
        run: |
          set -eux
          go mod download

      - name: Install xgettext-go
        run: |
          set -eux
          # XXX: during the LXD build step, `make i18n` cannot install
          #      xgettext-go due to being in LXD_OFFLINE mode. Furthermore, the
          #      Makefile uses `go get` which is no longer supported outside of
          #      a module with Go 1.18
          cd /
          go install -v -x github.com/snapcore/snapd/i18n/xgettext-go@2.57.1

      - name: Run LXD build
        run: |
          set -eux
          make deps
          make

      - name: Setup MicroCeph
        if: ${{ matrix.backend == 'ceph' }}
        uses: ./.github/actions/setup-microceph
        with:
          osd-count: 3
          microceph-channel: "squid/edge"

      - name: "Run system tests (${{ matrix.suite }}, ${{ matrix.backend }})"
        run: |
          set -eux
          chmod +x ~
          echo "root:1000000:1000000000" | sudo tee /etc/subuid /etc/subgid
          cd test
          sudo --preserve-env=PATH,GOPATH,GITHUB_ACTIONS,LXD_VERBOSE,LXD_BACKEND,LXD_CEPH_CLUSTER,LXD_CEPH_CEPHFS,LXD_CEPH_CEPHOBJECT_RADOSGW,LXD_OFFLINE,LXD_SKIP_TESTS,LXD_REQUIRED_TESTS,LD_LIBRARY_PATH LD_LIBRARY_PATH=${LD_LIBRARY_PATH} LXD_BACKEND=${{ matrix.backend }} ./main.sh ${{ matrix.suite }}

  client:
    name: Client
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Create build directory
        run: |
          mkdir bin

      - name: Build static lxc
        env:
          CGO_ENABLED: 0
        run: |
          go build -o bin ./lxc

      - name: Build static lxd-p2c
        if: runner.os == 'Linux'
        env:
          CGO_ENABLED: 0
        run: |
          go build -o bin ./lxd-p2c

      - name: Unit tests (client)
        env:
          CGO_ENABLED: 0
        run: go test -v ./client/...

      - name: Unit tests (lxc)
        env:
          CGO_ENABLED: 0
        run: go test -v ./lxc/...

      - name: Unit tests (shared)
        env:
          CGO_ENABLED: 0
        run: go test -v ./shared/...

      - name: Upload lxc client artifacts
        uses: actions/upload-artifact@v7
        continue-on-error: true
        with:
          name: ${{ runner.os }}
          path: bin/

  lxd-migrate:
    name: Test lxd-migrate build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.3

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.18.x

      - name: Test lxd-migrate build
        run: |
          set -eux
          cd "${GITHUB_WORKSPACE}/lxd-migrate"
          CGO_ENABLED=0 go build -v -tags netgo

  documentation:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Build docs (Sphinx)
        shell: 'script -q -e -c "export TERM=xterm-256color; bash {0}"'
        run: |
          set -eux
          make doc
          if [ -s doc/.sphinx/warnings.txt ]; then cat doc/.sphinx/warnings.txt; exit 1; fi

      - name: Upload documentation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: doc/html

  snap:
    name: Trigger snap build
    runs-on: ubuntu-24.04
    needs: [code-tests, system-tests, client, documentation]
    if: ${{ github.repository == 'canonical/lxd' && github.event_name == 'push' && github.actor != 'dependabot[bot]' }}
    env:
      SSH_AUTH_SOCK: /tmp/ssh_agent.sock
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # A non-shallow clone is needed for the rebase with the lxd-private branch
          fetch-depth: 0
          persist-credentials: false

      # XXX: from this point onwards in this **specific job**, the private SSH key is
      #      available through the SSH_AUTH_SOCK environment variable.
      - uses: ./.github/actions/lp-snap-build
        with:
          repo: "git+ssh://lxdbot@git.launchpad.net/~lxd-snap/lxd"
          ssh-key: "${{ secrets.LAUNCHPAD_LXD_BOT_KEY}}" # zizmor: ignore[secrets-outside-env]

      - name: Trigger Launchpad snap build
        run: |
          set -eux
          set -o pipefail

          # Record current commit hash before rebasing lxd-private so the snap version retains the correct hash.
          localRev="$(git rev-parse HEAD)"

          # Add the private LXD repository and rebase to incorporate private security fixes.
          git remote add lxd-private git@github.com:canonical/lxd-private.git
          git fetch lxd-private "${GITHUB_REF_NAME}"
          git checkout --quiet -B "lxd-private-${GITHUB_REF_NAME}" "lxd-private/${GITHUB_REF_NAME}"
          git rebase --quiet --no-stat "origin/${GITHUB_REF_NAME}"

          # Extract a strict major.minor[.patch] version from shared/version/flex.go.
          version="$(sed -nE 's/^var Version = "([0-9]+\.[0-9]+(\.[0-9]+)?)"$/\1/p' "${GITHUB_WORKSPACE}/shared/version/flex.go")"

          if [ -z "${version}" ]; then
            echo "ERROR: Invalid version format in shared/version/flex.go. Expected format: n.n or n.n.n" >&2
            exit 1
          fi

          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            BRANCH="latest-edge"
          elif [[ "${GITHUB_REF_NAME}" =~ ^stable- ]]; then
            BRANCH="${GITHUB_REF_NAME#stable-}-edge"
          elif [[ "${GITHUB_REF_NAME}" =~ ^release-6\. ]]; then
            BRANCH="6-candidate"
          elif [[ "${GITHUB_REF_NAME}" =~ ^release-([0-9]+)\.([0-9]+)\.[0-9]+$ ]]; then
            BRANCH="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}-candidate"
          else
            echo "ERROR: Unsupported GITHUB_REF_NAME pattern: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

          # Determine snap version and grade based on edge or candidate.
          grade="devel"
          if [[ "${BRANCH}" == *"-candidate" ]]; then
            versionString="${version}-${localRev:0:7}"
            grade="stable"
          else
            versionString="git-${localRev:0:7}"
          fi

          cd "${GITHUB_WORKSPACE}/snap"

          # Fail unless exactly one `version: git` line exists, then replace it.
          match_count="$(grep -cxF 'version: git' snapcraft.yaml || true)"
          if [ "${match_count}" -ne 1 ]; then
            echo "ERROR: Expected exactly one 'version: git' line in snapcraft.yaml, found ${match_count}" >&2
            exit 1
          fi

          sed -i -e "s/^version: git$/version: ${versionString}/" snapcraft.yaml

          if [ "${grade}" = "stable" ]; then
            # Fail unless exactly one `grade: devel` line exists, then replace it.
            match_count="$(grep -cxF 'grade: devel' snapcraft.yaml || true)"
            if [ "${match_count}" -ne 1 ]; then
              echo "ERROR: Expected exactly one 'grade: devel' line in snapcraft.yaml, found ${match_count}" >&2
              exit 1
            fi

            sed -i -e "s/^grade: devel$/grade: stable/" snapcraft.yaml
          fi

          git add snapcraft.yaml
          git commit --quiet -s -m "Automatic upstream build (${BRANCH})" -m "Upstream commit: ${localRev} (version: ${versionString})"
          git show

          # Pack all objects (including lxd-private ones) and generate a bitmap index
          # right before the push so that pack generation benefits from full bitmap coverage.
          git config --local pack.useBitmaps true
          git gc --prune=now

          git push --quiet --force launchpad HEAD:"${BRANCH}"

          # Unload the SSH key from the agent now that the push is done, to
          # prevent accidental usage in any subsequent steps within this job.
          ssh-add -D