name: Download external test images
description: Download external test images and cache them

inputs:
  prime-cache-only:
    description: 'Set to true to only populate cache on miss without restoring files. When false (default), cache will be restored if available.'
    default: "false"
    required: false
  image-cache-dir:
    description: Where to save the image dependencies
    required: true

runs:
  using: composite
  steps:
    - name: images cache key
      id: images-cache-key
      shell: bash
      run: |
        set -eux
        ARCH="$(dpkg --print-architecture)"

        # i.e: images-amd64-2025-week-47
        DATE="$(date --utc +%Y-week-%W)"
        echo "KEY=images-${ARCH}-${DATE}" >> $GITHUB_OUTPUT

    # GitHub will remove any cache entries that have not been accessed in over 7 days.
    # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/caching-dependencies-to-speed-up-workflows#usage-limits-and-eviction-policy
    # Restoring the cache is safe even from untrusted forks
    - name: Restore images cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: cache-images
      with:
        path: ${{ inputs.image-cache-dir }}
        key: ${{ steps.images-cache-key.outputs.KEY }}
        # If true, it checks if the cache exists without pulling down the files
        lookup-only: ${{ inputs.prime-cache-only == 'true' }}

    - name: Download images
      if: ${{ steps.cache-images.outputs.cache-hit != 'true' }}
      env:
        IMAGE_CACHE_DIR: ${{ inputs.image-cache-dir }}
      shell: bash
      run: |
        set -eux

        . test/includes/setup.sh
        download_test_images

    # Only save if there wasn't an exact cache hit, AND the code is running on the main repo (not an untrusted fork)
    - name: Save images cache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: |
        steps.cache-images.outputs.cache-hit != 'true' &&
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      with:
        path: ${{ inputs.image-cache-dir }}
        key: ${{ steps.images-cache-key.outputs.KEY }}
