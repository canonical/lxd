name: Bug report
description: Create a report to help us improve
type: "Bug"

body:
  - type: markdown
    attributes:
      value: |
        **Note**: GitHub issues are used for bug reports. For support questions, please use [our forum](https://discourse.ubuntu.com/c/lxd/).

        Please fill out the fields below to the best of your ability. Doing so will help us track down and reproduce your bug.

        If a field does not apply to your bug, you can answer "n/a". Feel free to add more information where it makes sense.

  - type: checkboxes
    id: ack_searched
    attributes:
      label: Please confirm
      options:
        - label: I have searched existing issues to check if an issue already exists for the bug I encountered.
          required: true

  - type: input
    id: distribution
    attributes:
      label: Distribution
      description: Which Linux distribution are you using?
    validations:
      required: true

  - type: input
    id: distro_version
    attributes:
      label: Distribution version
      description: Which version of the distribution are you using?
    validations:
      required: true

  - type: textarea
    id: snap_list
    attributes:
      label: Output of `snap list --all lxd core20 core22 core24 snapd`
      render: shell
    validations:
      required: true

  - type: textarea
    id: system_info
    attributes:
      label: System info
      description: |
        From `lxc info` (or other sources if that command fails), provide the kernel version, LXC version, the LXD version, and storage backend.
        Do not copy and paste the full output from `lxc info` because it might contain sensitive information.
      placeholder: |
        Provide the relevant information in the format of the example below:
        Kernel version (`kernel_version`): 6.17.0-19-generic
        LXC version (`driver_version`): 6.0.4
        LXD version (`server_version`): 5.21.4
        Storage backend: zfs
    validations:
      required: true

  - type: textarea
    id: instance_log
    attributes:
      label: Instance log
      description: Output from `lxc info <instance> --show-log` for the instance involved in the issue, if applicable.
      placeholder: If not applicable, answer "n/a".
    validations:
      required: true
      
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What is the **expected** behavior you anticipated? Please be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
      description: What is the **actual** behavior you observed? Please be as specific as possible, including any error messages you received.
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Step one
        2. Step two
        3. Step three
    validations:
      required: true

  - type: checkboxes
    id: attachments
    attributes:
      label: Information to attach
      description: If you have any of the following information, please attach them as text files.
      options:
        - label: Any relevant kernel output (`dmesg`)
        - label: Instance configuration (`lxc config show <instance> --expanded`)
        - label: Main daemon log (at `/var/log/lxd/lxd.log` or `/var/snap/lxd/common/lxd/logs/lxd.log`)
        - label: If a lxc command fails, output of the command with `--debug`
        - label: Output of the daemon with `--debug` (or use `lxc monitor` while reproducing the issue)
