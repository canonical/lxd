  # Core components
  lxc:
    after:
      - apparmor
    source: https://github.com/lxc/lxc
    source-depth: 1
    source-type: git
    build-packages:
      - libapparmor-dev
      - libcap-dev
      - libseccomp-dev
      - pkg-config
      - meson
      - ninja-build
    plugin: meson
    meson-parameters:
      - "--buildtype=release"
      - -Dapparmor=true
      - -Dcapabilities=true
      - -Dcommands=false
      - -Ddbus=false
      - -Dexamples=false
      - -Dinstall-init-files=false
      - -Dinstall-state-dirs=false
      - -Dman=false
      - -Dmemfd-rexec=false
      - -Dopenssl=false
      - -Dprefix=/
      - -Drootfs-mount-path=/var/snap/lxd/common/lxc/
      - -Dseccomp=true
      - -Dselinux=false
      - -Dspecfile=false
      - -Dtests=false
      - -Dtools=false
    organize:
      snap/lxd/current/lxc: lxc
      share/lxc/hooks: lxc/hooks
    prime:
      - bin/lxc-checkconfig
      - lib/*/liblxc.so.1
      - lib/*/liblxc.so.1.*
      - lxc/config/common.conf.d
      - lxc/hooks/nvidia
    override-build: |
      set -ex

      # Git cherry-picks
      cd ../src
      git config user.email "noreply@lists.canonical.com"
      git config user.name "LXD snap builder"

      # lxc-checkconfig.in does not need any preprocessing
      mkdir -p "${CRAFT_PART_INSTALL}/bin/"
      install --mode=0755 src/lxc/cmd/lxc-checkconfig.in "${CRAFT_PART_INSTALL}/bin/lxc-checkconfig"

      cd ../build

      set +ex
      craftctl default
      set -ex

      mkdir -p "${CRAFT_PART_INSTALL}/lxc/config/common.conf.d/"
      ln -s /var/snap/lxd/common/lxc/local.conf "${CRAFT_PART_INSTALL}/lxc/config/common.conf.d/01-local.conf"

  lxcfs:
    source: https://github.com/lxc/lxcfs
    source-depth: 1
    source-type: git
    build-packages:
      - libfuse3-dev
      - pkg-config
      - python3-jinja2
      - meson
      - ninja-build
    stage-packages:
      - fuse3
      - glibc-tools
    plugin: meson
    meson-parameters:
      - --prefix=/
      - --datadir=/snap/lxd/current/
      - --localstatedir=/var/snap/lxd/common/var/
      - -Ddocs=false
      - -Dtests=false
