name: lxd
base: core26
assumes:
  - snapd2.75
version: git
grade: devel
summary: LXD - container and VM manager
license: AGPL-3.0-only
title: LXD
description: |-
 LXD is a system container and virtual machine manager.

 It offers a simple CLI and REST API to manage local or remote instances,
 uses an image based workflow and support for a variety of advanced features.

 Images are available for all Ubuntu releases and architectures as well
 as for a wide number of other Linux distributions. Existing
 integrations with many deployment and operation tools, makes it work
 just like a public cloud, except everything is under your control.

 LXD containers are lightweight, secure by default and a great
 alternative to virtual machines when running Linux on Linux.

 LXD virtual machines are modern and secure, using UEFI and secure-boot
 by default and a great choice when a different kernel or operating
 system is needed.

 With clustering, up to 50 LXD servers can be easily joined and managed
 together with the same tools and APIs and without needing any external
 dependencies.


 Supported configuration options for the snap (snap set lxd [<key>=<value>...]):

   - apparmor.unprivileged-restrictions-disable: Whether to disable restrictions on unprivileged user namespaces [default=true]
   - ceph.builtin: Use snap-specific Ceph configuration [default=false]
   - ceph.external: Use the system's ceph tools (ignores ceph.builtin) [default=false]
   - daemon.debug: Increase logging to debug level [default=false]
   - daemon.group: Set group of users that have full control over LXD [default=lxd]
   - daemon.user.group: Set group of users that have restricted LXD access [default=lxd]
   - daemon.preseed: Pass a YAML configuration to `lxd init` on initial start
   - daemon.syslog: Send LXD log events to syslog [default=false]
   - daemon.verbose: Increase logging to verbose level [default=false]
   - db.trace: Enable dqlite trace logging (very verbose) [default=false]
   - lvm.external: Use the system's LVM tools [default=false]
   - lxcfs.loadavg: Start tracking per-container load average [default=false]
   - lxcfs.cfs: Consider CPU shares for CPU usage [default=false]
   - lxcfs.debug: Increase logging to debug level [default=false]
   - openvswitch.builtin: Run a snap-specific OVS daemon [default=false]
   - openvswitch.external: Use the system's OVS tools (ignores openvswitch.builtin) [default=false]
   - ovn.builtin: Use snap-specific OVN configuration [default=false]
   - zfs.external: Use the system's ZFS tools [default=false]

 For system-wide configuration of the CLI, place your configuration in
 /var/snap/lxd/common/global-conf/ (config.yml and servercerts)

contact: lxd@lists.canonical.com
issues: https://github.com/canonical/lxd/issues
source-code: https://github.com/canonical/lxd
website: https://ubuntu.com/lxd
confinement: strict

plugs:
 ceph-conf:
   interface: content
   target: "$SNAP_DATA/microceph"
 ovn-certificates:
   interface: content
   target: "$SNAP_DATA/microovn/certificates"
 ovn-chassis:
   interface: content
   target: "$SNAP_DATA/microovn/chassis"
 ovn-env:
   interface: content
   target: "$SNAP_DATA/microovn/ovn-env"
 gpu-2604:
   interface: content
   target: $SNAP/gpu-2604
   #default-provider: mesa-2604
 qemu-external:
   interface: content
   content: qemu-external-binaries
   target: $SNAP/external/qemu

layout:
  /usr/share/libdrm:
    bind: $SNAP/gpu-2604/mesa-2604/usr/share/libdrm
  /usr/share/drirc.d:
    symlink: $SNAP/gpu-2604/mesa-2604/usr/share/drirc.d
  # For PCI and USB ID files
  /usr/share/misc:
    bind: $SNAP/share/misc
  # With `core26` no longer shipping a Python interpreter, the LXD snap
  # needs to vendor its own Python runtime.
  /usr/bin/python3:
    # XXX: Apparmor follows symlinks so pointing to `$SNAP/bin/python3`
    # causes denials when the snap tries to execute Python scripts.
    # Instead, point directly to the actual interpreter.
    bind-file: $SNAP/bin/python3.14

apps:
  # Main commands
  activate:
    command: commands/daemon.activate
    daemon: oneshot
    plugs:
      - lxd-support
      - system-observe

  daemon:
    command-chain:
      - bin/gpu-2604-custom-wrapper
    command: commands/daemon.start
    reload-command: commands/daemon.reload
    stop-command: commands/daemon.stop
    stop-timeout: 600s
    restart-condition: on-failure
    daemon: simple
    slots:
      - lxd
    plugs:
      - lxd-support
      - network-bind
      - system-observe
    sockets:
      unix:
        listen-stream: $SNAP_COMMON/lxd/unix.socket
        socket-mode: 0660

  user-daemon:
    command: commands/lxd-user
    stop-timeout: 600s
    restart-condition: on-failure
    daemon: simple
    plugs:
      - lxd-support
      - network-bind
      - system-observe
    sockets:
      unix:
        listen-stream: $SNAP_COMMON/lxd-user/unix.socket
        socket-mode: 0660

  lxc:
    command: commands/lxc
    completer: lxc-completer.sh
    plugs:
      - lxd-support
      - system-observe

  lxd:
    command: commands/lxd
    plugs:
      - lxd-support
      - system-observe

  # Sub-commands
  buginfo:
    command: commands/buginfo
    plugs:
      - lxd-support
      - system-observe
  check-kernel:
    command: commands/lxd-check-kernel
    plugs:
      - lxd-support
      - system-observe

hooks:
  connect-plug-ceph-conf:
    plugs:
      - lxd-support
      - system-observe
  disconnect-plug-ceph-conf:
    plugs:
      - lxd-support
      - system-observe
  connect-plug-ovn-certificates:
    plugs:
      - lxd-support
      - system-observe
  disconnect-plug-ovn-certificates:
    plugs:
      - lxd-support
      - system-observe
  connect-plug-ovn-chassis:
    plugs:
      - lxd-support
      - system-observe
  disconnect-plug-ovn-chassis:
    plugs:
      - lxd-support
      - system-observe
  connect-plug-qemu-external:
    plugs:
      - lxd-support
      - system-observe
  disconnect-plug-qemu-external:
    plugs:
      - lxd-support
      - system-observe
  configure:
    plugs:
      - lxd-support
      - network
      - system-observe
  remove:
    plugs:
      - lxd-support
      - system-observe

parts:
  # Dependencies
  python-runtime:
    plugin: nil
    stage-packages:
      - python3.14-minimal
      - libpython3.14-stdlib
    organize:
      usr/bin/: bin/
      usr/lib/: lib/
    prime:
      - bin/python3.14
      - lib/python3.14
      # Exclude unused bits
      - -lib/python3.14/lib-dynload/_remote_debugging.*.so
      - -lib/python3.14/lib-dynload/_test*.so
      - -lib/python3.14/test/
      - -lib/python3.14/unittest/

  amd-ctk:
    source: https://github.com/ROCm/container-toolkit
    source-commit: 59f21d9fdeb4a9373607b90352dbda272c721979 # v1.3.0
    source-depth: 1
    source-type: git
    plugin: go
    build-snaps:
      - go/1.26/stable
    build-environment:
      - GOTOOLCHAIN: "local"
      - GOFLAGS: "-trimpath"
    prime:
      - bin/amd-ctk

  btrfs:
    plugin: nil
    stage-packages:
      - btrfs-progs
    organize:
      usr/bin/: bin/
      usr/sbin/: bin/
    prime:
      - bin/btrfs
      - bin/btrfstune
      - bin/mkfs.btrfs

  ceph:
    after:
      - libatomic
      - python-runtime
    plugin: nil
    stage-packages:
      # XXX: explicitly depend on libsnappy1v5 due to https://bugs.launchpad.net/ubuntu/+source/ceph/+bug/2072656
      - to armhf: []
      - else:
        - ceph-common
        - libsnappy1v5
    organize:
      usr/bin/: bin/
      usr/lib/: lib/
    override-stage: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default
    override-prime: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default
    override-pull: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default
    override-build: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default
    prime:
      - bin/ceph
      - bin/radosgw-admin
      - bin/rbd
      - lib/*/ceph
      - lib/python3

      # Unneeded Python modules:
      - -lib/python3/dist-packages/ceph/deployment
      - -lib/python3/dist-packages/ceph/rgw
      - -lib/python3/dist-packages/ceph/tests
      - -lib/python3/dist-packages/cephfs*
      # and often flagged as outdated by Trivy:
      - -lib/python3/dist-packages/certifi*
      - -lib/python3/dist-packages/chardet*
      - -lib/python3/dist-packages/idna*
      - -lib/python3/dist-packages/requests*
      - -lib/python3/dist-packages/urllib3*

      - lib/*/libboost_context.so*
      - lib/*/libboost_filesystem.so*
      - lib/*/libboost_iostreams.so*
      - lib/*/libboost_process.so*
      - lib/*/libboost_program_options.so*
      - lib/*/libboost_thread.so*
      - lib/*/libboost_url.so*
      - lib/*/libbrotlicommon.so*
      - lib/*/libbrotlidec.so*
      - lib/*/libcurl-gnutls.so*
      - lib/*/libdaxctl.so*
      - lib/*/libibverbs.so*
      - lib/*/libicudata.so*
      - lib/*/libicuuc.so*
      - lib/*/liblber-2.5.so*
      - lib/*/liblber.so*
      - lib/*/libldap-2.5.so*
      - lib/*/libldap.so*
      - lib/*/liblmdb.so*
      - lib/*/liblua5.4.so*
      - lib/*/libncurses.so*
      - lib/*/libndctl.so*
      - lib/*/libnghttp2.so*
      - lib/*/liboath.so*
      - lib/*/libpmemobj.so*
      - lib/*/libpmem.so*
      - lib/*/libpsl.so*
      - lib/*/librabbitmq.so*
      - lib/*/librados.so*
      - lib/*/librbd.so*
      - lib/*/librdmacm.so*
      - lib/*/librtmp.so*
      - lib/*/libsasl2.so*
      - lib/*/libsnappy.so*
      - lib/*/libssh2.so*
      - lib/*/libtcmalloc.so*
      - lib/*/libunwind.so*

  dqlite:
    source: https://github.com/canonical/dqlite
    source-commit: f6058ba74838f89b3720c74b7bb4a944bfc36a09 # v1.18.6
    source-depth: 0
    source-type: git
    plugin: autotools
    autotools-configure-parameters:
      - --prefix=
      - --enable-build-raft
    stage-packages:
      - liblz4-1
      - libuv1t64
      - sqlite3
    build-packages:
      - liblz4-dev
      - libsqlite3-dev
      - libuv1-dev
      - xfslibs-dev
    organize:
      usr/bin/: bin/
      usr/lib/: lib/
    override-build: |
      set -ex

      # Git cherry-picks
      cd ../src
      git config user.email "noreply@lists.canonical.com"
      git config user.name "LXD snap builder"

      git cherry-pick -x ef0fa37880d0112c19953f75eee45819128a4e99 # feat: use MFD_CLOEXEC flag to prevent leak across exec calls (#893)

      set +ex
      craftctl default
      set -ex
    prime:
      - bin/sqlite3  # not used by LXD but small and useful for emergency situations
      - lib/libdqlite*so*
      - lib/*/libsqlite3*so*
      - lib/*/libuv*
      #- lib/*/liblz4.so*  # use liblz4.so from the base snap

  edk2:
    after:
      - qemu
    source: https://git.launchpad.net/ubuntu/+source/edk2
    source-depth: 1
    source-commit: b922ebea8da4ddf4a59a652ac570f018672f4872 # import/2025.11-3ubuntu7
    source-type: git
    plugin: nil
    build-packages:
      - to amd64:
        - acpica-tools
        - bc
        - debhelper
        - dosfstools
        - g++
        - grub-efi-amd64-signed
        - jq
        - lsb-release
        - mtools
        - nasm
        - openssl
        - python3
        - python3-pexpect
        - python3-virt-firmware
        - quilt
        - rsync
        - sbsigntool
        - shim-signed
        - uuid-dev
        - xorriso
      - to arm64:
        - acpica-tools
        - bc
        - debhelper
        - dosfstools
        - g++
        - grub-efi-arm64-signed
        - jq
        - lsb-release
        - mtools
        - nasm
        - openssl
        - python3
        - python3-pexpect
        - python3-virt-firmware
        - quilt
        - rsync
        - sbsigntool
        - shim-signed
        - uuid-dev
        - xorriso
      - to riscv64:
        - acpica-tools
        - g++
        - lsb-release
        - nasm
        - quilt
        - rsync
        - uuid-dev
    override-stage: |-
      [ "$(uname -m)" != "x86_64" ] && [ "$(uname -m)" != "aarch64" ] && [ "$(uname -m)" != "riscv64" ]  && exit 0
      craftctl default
    override-prime: |-
      [ "$(uname -m)" != "x86_64" ] && [ "$(uname -m)" != "aarch64" ] && [ "$(uname -m)" != "riscv64" ]  && exit 0
      craftctl default
    override-pull: |-
      [ "$(uname -m)" != "x86_64" ] && [ "$(uname -m)" != "aarch64" ] && [ "$(uname -m)" != "riscv64" ]  && exit 0
      craftctl default
    override-build: |-
      [ "$(uname -m)" != "x86_64" ] && [ "$(uname -m)" != "aarch64" ] && [ "$(uname -m)" != "riscv64" ]  && exit 0
      set -eux

      # Ensure staged libraries are found (needed for qemu to generate secure boot vars)
      export LD_LIBRARY_PATH="${CRAFT_STAGE}/lib/$(dpkg-architecture -qDEB_HOST_MULTIARCH):${CRAFT_STAGE}/lib:${LD_LIBRARY_PATH:-}"

      # Apply patches from Ubuntu sources.
      QUILT_PATCHES=debian/patches quilt push -a

      # Secboot firmware (SECURE_BOOT_ENABLE=TRUE) enforces strict W^X memory (NX protection)
      # protection via EFI_MEMORY_ATTRIBUTE_PROTOCOL (new in EDK2 2025.11+).
      # Older bootloaders might be unusable:
      # * https://bugs.launchpad.net/ubuntu/+source/edk2/+bug/2149400 (Synchronous Exception)
      # * https://github.com/canonical/lxd/issues/18187 (Exception Type - 0E(#PF - Page-Fault))
      # Workaround: add $(NO_STRICTNX_COMMON_FLAGS) (i.e. --pcd PcdUninstallMemAttrProtocol=TRUE)
      # to OVMF_4M_SECBOOT_FLAGS and AAVMF_SECBOOT_FLAGS so the protocol is
      # uninstalled before the bootloader runs.
      # Secure Boot signature verification (SECURE_BOOT_ENABLE=TRUE) remains active; only
      # the W^X enforcement is disabled as if
      # lxc config set <inst> raw.qemu="-fw_cfg name=opt/org.tianocore/UninstallMemAttrProtocol,string=y"
      # had been used.
      # The longer term plan is to stop disabling this protection and instead document that older guests
      # require `boot.mode=uefi-nosecureboot`.
      sed -i 's/^\(\(AAVMF\|OVMF_4M\)_SECBOOT_FLAGS = .*\)$/\1 $(NO_STRICTNX_COMMON_FLAGS)/' debian/rules

      # Apply patches
      patch -p1 < "${CRAFT_PROJECT_DIR}/patches/edk2-0001-force-DUID-LLT.patch"
      cp "${CRAFT_PROJECT_DIR}/patches/edk2-0002-logo.bmp" MdeModulePkg/Logo/Logo.bmp
      patch -p1 < "${CRAFT_PROJECT_DIR}/patches/edk2-0003-boot-delay.patch"

      # Install files destination
      mkdir -p "${CRAFT_PART_INSTALL}/share/qemu/"

      if [ "$(uname -m)" = "x86_64" ]; then
          DSC="OvmfPkg/OvmfPkgX64.dsc"
          BUILD_TARGETS="install-ovmf-secboot install-ovmf-no-secboot"
          SRC_DIR="debian/tmp/usr/share/OVMF"
          SRC_CODE="OVMF_CODE_4M.ms.fd"
          SRC_CODE_NOSB="OVMF_CODE_4M.fd"
          SRC_VARS="OVMF_VARS_4M.fd"
          SRC_VARS_MS="OVMF_VARS_4M.ms.fd"
          DST_CODE="OVMF_CODE_4M.ms"
          DST_CODE_NOSB="OVMF_CODE_4M"
          DST_VARS="OVMF_VARS_4M"
          DST_VARS_MS="OVMF_VARS_4M.ms"
          # Add DEBUG_VERBOSE to print error level for DEBUG build
          # * 0x80000000 (DEBUG_ERROR)
          # * 0x00000040 (DEBUG_INFO)
          # * 0x0000000F (Bits 0-3: DEBUG_INIT, DEBUG_WARN, DEBUG_LOAD, DEBUG_FS)
          # = 0x8000004F
          # Adding 0x00400000 (DEBUG_VERBOSE) gives 0x8040004F
          SED_EXPR="s#PcdDebugPrintErrorLevel|0x8000004F#PcdDebugPrintErrorLevel|0x8040004F#g"
      elif [ "$(uname -m)" = "aarch64" ]; then
          DSC="ArmVirtPkg/ArmVirt.dsc.inc"
          BUILD_TARGETS="install-qemu-efi-aarch64-secboot install-qemu-efi-aarch64-no-secboot"
          SRC_DIR="debian/tmp/usr/share/AAVMF"
          SRC_CODE="AAVMF_CODE.ms.fd"
          # XXX: The package doesn't create AAVMF_CODE.fd for this
          # non-secureboot variant, but we need a consistent name for the snap,
          # so we copy it from the .no-secboot.fd file.
          SRC_CODE_NOSB="AAVMF_CODE.no-secboot.fd"
          SRC_VARS="AAVMF_VARS.fd"
          SRC_VARS_MS="AAVMF_VARS.ms.fd"
          DST_CODE="AAVMF_CODE.ms"
          DST_CODE_NOSB="AAVMF_CODE"
          DST_VARS="AAVMF_VARS"
          DST_VARS_MS="AAVMF_VARS.ms"
          # See note in `x86_64` section for DEBUG_VERBOSE explanation
          SED_EXPR="s#DEBUG_PRINT_ERROR_LEVEL = 0x8000004F#DEBUG_PRINT_ERROR_LEVEL = 0x8040004F#g"
      elif [ "$(uname -m)" = "riscv64" ]; then
          DSC="OvmfPkg/RiscVVirt/RiscVVirtQemu.dsc"
          BUILD_TARGETS="install-qemu-efi-riscv64"
          SRC_DIR="debian/tmp/usr/share/qemu-efi-riscv64"
          SRC_CODE=""
          SRC_CODE_NOSB="RISCV_VIRT_CODE.fd"
          SRC_VARS="RISCV_VIRT_VARS.fd"
          SRC_VARS_MS=""
          DST_CODE=""
          DST_CODE_NOSB="RISCV_VIRT_CODE"
          DST_VARS="RISCV_VIRT_VARS"
          DST_VARS_MS=""
          # See note in `x86_64` section for DEBUG_VERBOSE explanation
          SED_EXPR="s#DEBUG_PRINT_ERROR_LEVEL = 0x8000004F#DEBUG_PRINT_ERROR_LEVEL = 0x8040004F#g"
      fi

      # Function to run build and install
      run_build() {
          local TYPE="${1}"
          local SUFFIX="${2}"

          # Clean up previous build stamps/artifacts to ensure clean rebuild with new TYPE
          rm -f debian/setup-build-stamp
          rm -rf debian/*-install debian/tmp
          rm -rf Build

          if [ "${TYPE}" = "DEBUG" ]; then
              # Add `DEBUG_VERBOSE` to print error level for DEBUG build
              sed --in-place=.bak "${SED_EXPR}" "${DSC}"
          fi

          # Enable parallel builds to avoid lengthy build times due to LTO. amd64 build on LP goes from ~1h45m -> ~60m
          # lto-wrapper: note: see the ‘-flto’ option documentation for more information
          # BUILD_TARGETS holds one or more space-separated make goals, so it must stay
          # unquoted here to be word-split into separate targets.
          # shellcheck disable=SC2086
          /usr/bin/make -j$(nproc) -f debian/rules ${BUILD_TARGETS} BUILD_TYPE="${TYPE}"

          if [ "${TYPE}" = "DEBUG" ] && [ -f "${DSC}.bak" ]; then
              mv "${DSC}.bak" "${DSC}"
          fi

          if [ -n "${SRC_CODE}" ] && [ -n "${DST_CODE}" ]; then
              cp "${SRC_DIR}/${SRC_CODE}" "${CRAFT_PART_INSTALL}/share/qemu/${DST_CODE}${SUFFIX}.fd"
          fi
          cp "${SRC_DIR}/${SRC_CODE_NOSB}" "${CRAFT_PART_INSTALL}/share/qemu/${DST_CODE_NOSB}${SUFFIX}.fd"
          cp "${SRC_DIR}/${SRC_VARS}" "${CRAFT_PART_INSTALL}/share/qemu/${DST_VARS}${SUFFIX}.fd"

          if [ "${TYPE}" = "RELEASE" ] && [ -n "${SRC_VARS_MS}" ] && [ -n "${DST_VARS_MS}" ]; then
               cp "${SRC_DIR}/${SRC_VARS_MS}" "${CRAFT_PART_INSTALL}/share/qemu/${DST_VARS_MS}.fd"
          fi
      }

      # Build Release
      run_build RELEASE ""

      # RISC-V build is already very slow and adding a DEBUG build makes it even slower, so skip it.
      if [ "$(uname -m)" != "riscv64" ]; then
        # Build Debug (silence the copious build output to avoid doubling it)
        run_build DEBUG ".debug" > /dev/null
      fi

      # Cleanup debug vars
      rm -f "${CRAFT_PART_INSTALL}/share/qemu/${DST_VARS}.debug.fd"
    prime:
      - share/qemu/*

  libatomic:
    plugin: nil
    override-stage: |-
      [ "$(uname -m)" != "riscv64" ] && [ "$(uname -m)" != "s390x" ] && exit 0
      craftctl default
    override-prime: |-
      [ "$(uname -m)" != "riscv64" ] && [ "$(uname -m)" != "s390x" ] && exit 0
      craftctl default
    stage-packages:
      - to riscv64:
        - libatomic1
      - to s390x:
        - libatomic1
    organize:
      usr/lib/: lib/
    prime:
      # XXX: libatomic.so is needed by Ceph/QEMU on s390x and riscv64.
      - lib/*/libatomic.so*

  logrotate:
    plugin: nil
    stage-packages:
      - logrotate
    organize:
      usr/bin/: bin/
      usr/lib/: lib/
      usr/sbin/: bin/
    stage:
      - bin/logrotate
    prime:
      - bin/logrotate

  lvm:
    plugin: nil
    stage-packages:
      - dmeventd
      - lvm2
      - thin-provisioning-tools
    organize:
      usr/lib/: lib/
      usr/sbin/: bin/
    override-build: |-
      # Patch lvm.conf to:
      # 1) Disable bits that don't apply in a snap'ed env. Handle commented
      #    out variants that represent builtin values.
      #    * udev_sync
      #    * udev_rules
      #    * use_lvmetad
      #    * monitoring
      # 2) Uncomment all executable directives to override their builtin
      #    values. Replace paths in /usr/bin, /usr/sbin, /bin and /sbin
      #    by /snap/lxd/current/bin to use executables from the snap.
      sed -i \
        -e "s%\(# \)\?udev_sync = 1%udev_sync = 0%" \
        -e "s%\(# \)\?udev_rules = 1%udev_rules = 0%" \
        -e "s%\(# \)\?use_lvmetad = 1%use_lvmetad = 0%" \
        -e "s%\(# \)\?monitoring = 1%monitoring = 0%" \
        -e "/# .*_\?executable =/s/# //" \
        -e "s%\(/usr\)\?/s\?bin/%/snap/lxd/current/bin/%" \
        "${CRAFT_PART_INSTALL}/etc/lvm/lvm.conf"

      craftctl default
    prime:
      - bin/cache_*
      - bin/dmeventd
      - bin/era_*
      - bin/lv*
      - bin/pdata_tools
      - bin/pv*
      - bin/thin_*
      - bin/vg*
      - -bin/vgimportclone
      - -bin/lvmconf
      - -bin/lvmdump
      - -bin/lvmetad
      - -bin/lvmpolld
      - etc/lvm/lvm.conf
      - etc/lvm/profile/*
      - lib/*/device-mapper/*
      - lib/*/libaio.so*
      - lib/*/libdevmapper*
      - lib/*/liblvm*
      - lib/*/libreadline.so*

  nftables:
    plugin: nil
    stage-packages:
      - nftables
    organize:
