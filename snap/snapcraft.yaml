      - --enable-cap-ng
      - --enable-kvm
      - --enable-libusb
      - --enable-usb-redir
      - --enable-linux-aio
      - --enable-linux-io-uring
      - --enable-numa
      - --enable-pie
      - --enable-rbd
      - --enable-seccomp
      - --enable-spice
      - --enable-system
      - --enable-tools
      - --enable-vhost-crypto
      - --enable-vhost-kernel
      - --enable-vhost-net
      - --enable-vhost-user
      - --firmwarepath=/snap/lxd/current/share/qemu/
      - --localstatedir=/var/
      - --disable-install-blobs # Ubuntu sources don't have the ROM blobs in them.
    build-packages:
      - to armhf: []
      - else:
        - bison
        - bzip2
        - flex
        - pkg-config
        - libaio-dev
        - libcap-ng-dev
        - libfdt-dev
        - libglib2.0-dev
        - libnuma-dev
        - libpixman-1-dev
        - libseccomp-dev
        - liburing-dev
        - libusb-1.0-0-dev
        - libusbredirparser-dev
        - meson
        - quilt
        - librbd-dev
    stage-packages:
      - to armhf: []
      - else:
        - genisoimage
        - ipxe-qemu # This is needed due to --disable-install-blobs.
        - libfdt1
        - libmagic1t64
        - libnuma1
        - libpixman-1-0
        - libusb-1.0-0
        - libusbredirparser1t64
        - liburing2
        - opensbi # This is needed due to --disable-install-blobs.
        - seabios # This is needed due to --disable-install-blobs.
        - qemu-system-data # This is needed due to --disable-install-blobs.
    override-stage: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default
    override-prime: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default
    override-pull: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      craftctl default

    override-build: |-
      [ "$(uname -m)" = "armv7l" ] && exit 0
      set -ex
      # If configure finds a `.git` dir, it enables -Werror (`--enable-werror` and Git submodules are validated).
      # When building the deb on LP, this `.git` dir is not present because a tarball is used.
      # The `-Werror` causes compilation failures on ppc64el so let's remove the `.git` dir to align with the deb behavior.
      [ -d .git ] && rm -rf .git

      # Mangle the configure a bit
      QEMUARCH="$(uname -m)"
      [ "${QEMUARCH}" = "ppc64le" ] && QEMUARCH="ppc64"

      # Apply patches from Ubuntu sources.
      QUILT_PATCHES=debian/patches quilt push -a

      sed -i "s/^unset target_list$/target_list=\"${QEMUARCH}-softmmu\"/" configure
      sed -i 's#libseccomp_minver=".*#libseccomp_minver="0.0"#g' configure

      # As of May 2026 QEMU for riscv64 does not support building with --disable-tcg
      if [ "${QEMUARCH}" = "riscv64" ]; then
          # `set -- "$@"`: preserve arguments passed to `configure` and append
          # `--enable-tcg` at the end to override the previous `--disable-tcg`.
          sed -i '1 a set -- "$@" --enable-tcg' configure
      fi

      # opensbi provides `fw_dynamic.bin` and `qemu-system-riscv` creates a
      # symlink. Manually moving the binary into place avoids pulling the QEMU
      # package just for the symlink.
      if [ "${QEMUARCH}" = "riscv64" ]; then
          mkdir -p "${CRAFT_PART_INSTALL}"/share/qemu/
          mv "${CRAFT_PART_INSTALL}"/usr/lib/riscv64-linux-gnu/opensbi/generic/fw_dynamic.bin "${CRAFT_PART_INSTALL}"/share/qemu/opensbi-riscv64-generic-fw_dynamic.bin
      fi

      set +ex
      craftctl default

    organize:
      usr/bin/: bin/
      usr/lib/: lib/
      usr/local/bin/: bin/
      usr/local/lib/: lib/
      usr/local/libexec/: bin/
      usr/local/share/: share/
      usr/share/qemu/efi-virtio.rom: share/qemu/
      usr/share/qemu/s390-ccw.img: share/qemu/
      usr/share/qemu/slof.bin: share/qemu/
      usr/share/seabios/bios-256k.bin: share/qemu/
      usr/share/seabios/vgabios-virtio.bin: share/qemu/
    prime:
      - bin/genisoimage*
      - bin/mkisofs*
      - bin/qemu-system-*
      - bin/qemu-img*
      - lib/*/libatomic.so*
      - lib/*/libmagic*so*
      - lib/*/libnuma*so*
      - lib/*/libpixman*so*
      - lib/*/liburing.so*
      - lib/*/libusbredir*so*
      - lib/*/libusb*so*
      - lib/*/libfdt*.so*
      - to amd64:
        - share/qemu/bios-256k.bin
        - share/qemu/efi-virtio.rom
        - share/qemu/vgabios-virtio.bin
      - to arm64:
        - share/qemu/vgabios-virtio.bin
      - to ppc64el:
        - share/qemu/slof.bin
      - to riscv64:
        - share/qemu/opensbi-riscv64-generic-fw_dynamic.bin
      - to s390x:
        - share/qemu/s390-ccw.img

